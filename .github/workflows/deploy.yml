name: CD — Deploy to Vercel

on:
  push:
    branches: [master, main]

jobs:
  # ─── Deploy Student PWA ───────────────────────────────────────────────────
  deploy-app:
    name: Deploy App → campusar.vercel.app
    runs-on: ubuntu-latest
    if: hashFiles('app/package.json') != '' && vars.DEPLOY_ENABLED == 'true'  # set DEPLOY_ENABLED=true in Week 6
    environment:
      name: production
      url: https://campusar.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build app
        working-directory: app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel (Production)
        working-directory: app
        run: |
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_TEAM_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_APP }}

  # ─── Deploy Admin Panel ───────────────────────────────────────────────────
  deploy-admin:
    name: Deploy Admin → admin-campusar.vercel.app
    runs-on: ubuntu-latest
    if: hashFiles('admin/package.json') != '' && vars.DEPLOY_ENABLED == 'true'  # set DEPLOY_ENABLED=true in Week 6
    environment:
      name: production-admin
      url: https://admin-campusar.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Build admin
        working-directory: admin
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel (Production)
        working-directory: admin
        run: |
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_TEAM_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
