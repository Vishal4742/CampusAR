name: CI — Pull Request Checks

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  # ─── Job 1: Type-check + Lint + Build (Student App) ───────────────────────
  check-app:
    name: App — TypeCheck + Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ─── Job 2: Type-check + Lint + Build (Admin Panel) ──────────────────────
  check-admin:
    name: Admin — TypeCheck + Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}


  # ─── Job 4: PR Size Guard ─────────────────────────────────────────────────
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR isn't too large
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          echo "Files changed: $FILES"
          if [ "$FILES" -gt 50 ]; then
            echo "❌ PR changes $FILES files — break this into smaller PRs!"
            exit 1
          fi
          echo "✅ PR size OK ($FILES files)"
